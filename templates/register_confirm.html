<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checked In!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      body {
        background: #0d2118;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col items-center justify-center p-5 text-center"
    style="color: #fff"
  >
    <div class="w-full max-w-sm">
      <div
        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full mb-3 font-bold text-sm uppercase tracking-widest"
        style="
          background: rgba(63, 162, 109, 0.22);
          color: #3fa26d;
          border: 1px solid #3fa26d;
        "
      >
        TIME IN RECORDED
      </div>
      <h1 class="text-2xl font-bold mb-1" id="greetName">Welcome!</h1>
      <p class="text-sm mb-1" style="color: #3fa26d" id="timeLabel"></p>

      <!-- QR section -->
      <div
        class="mt-5 p-5 rounded-2xl"
        style="background: rgba(63, 162, 109, 0.12); border: 1px solid #3fa26d"
      >
        <p
          class="text-xs font-bold uppercase tracking-widest mb-3"
          style="color: #3fa26d"
        >
          Your Personal QR Code
        </p>
        <img
          id="qrImg"
          src=""
          alt="Your QR Code"
          class="w-44 h-44 rounded-xl mx-auto shadow-lg bg-white p-1"
        />
        <p class="text-xs mt-3 leading-relaxed" style="color: #888">
          <strong style="color: #fff">Screenshot this QR.</strong><br />
          Show it at the exit to record your Time Out.
        </p>
        <button
          onclick="downloadQR()"
          class="mt-3 text-xs font-semibold px-4 py-1.5 rounded-full hover:opacity-80 transition"
          style="background: #3fa26d; color: #fff"
        >
          ⬇ Save QR to Phone
        </button>
      </div>

      <!-- Checkout link -->
      <a
        href="/checkout"
        class="mt-5 flex items-center justify-center gap-2 w-full py-3 rounded-xl font-bold text-sm transition hover:opacity-90"
        style="
          background: rgba(196, 160, 74, 0.15);
          color: #c4a04a;
          border: 1px solid #c4a04a;
        "
      >
        Check Out Later →
      </a>

      <a
        href="/"
        class="mt-4 inline-block text-xs hover:underline"
        style="color: #3a3020"
        >← Back to Home</a
      >
    </div>

    <script>
      const p = new URLSearchParams(window.location.search);
      const id = p.get("id");
      const name = p.get("name");
      const time = p.get("time");

      if (!id || !name) {
        window.location.href = "/register";
      } else {
        document.getElementById("greetName").textContent = `Welcome, ${name}!`;
        document.getElementById("timeLabel").textContent = `Time In: ${time}`;
        document.getElementById("qrImg").src = `/api/attendees/${id}/qr`;
      }

      function downloadQR() {
        const a = document.createElement("a");
        a.href = `/api/attendees/${id}/qr`;
        a.download = "my-event-qr.png";
        a.click();
      }
    </script>
  </body>
</html>
