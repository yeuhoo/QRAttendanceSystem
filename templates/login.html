<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – QR Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center"
    style="background: #fafafa"
  >
    <div class="w-full max-w-sm p-6">
      <div class="text-center mb-6">
        <h1 class="text-xl font-bold" style="color: #c4a04a">QR Attendance</h1>
        <p class="text-sm text-gray-500 mt-1">Admin Login</p>
      </div>

      <div class="bg-white rounded-xl shadow p-6">
        {% if error %}
        <div
          class="mb-4 p-3 rounded-lg text-sm text-white"
          style="background: #dc2626"
        >
          {{ error }}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              name="username"
              required
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2"
              style="border-color: #e5e5e5; --tw-ring-color: #c4a04a66"
              placeholder="Enter username"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              name="password"
              required
              class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2"
              style="border-color: #e5e5e5; --tw-ring-color: #c4a04a66"
              placeholder="Enter password"
            />
          </div>
          <button
            type="submit"
            class="w-full py-2 rounded-lg font-semibold text-white transition hover:opacity-90"
            style="background: #c4a04a"
          >
            Login
          </button>
        </form>
      </div>

      <p class="text-center mt-4">
        <a href="/" class="text-sm hover:underline" style="color: #c4a04a"
          >← Back to Home</a
        >
      </p>
    </div>
  </body>
</html>
